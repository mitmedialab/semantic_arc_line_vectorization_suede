[pytest]
# Tests live outside the shipped tree and import it as `release.postprocess`
# (`release` is a namespace package; the vendored deps sit at `release.suede.*`
# and are reached via relative imports). The repo root on the path is all that's
# needed; `consider_namespace_packages` lets pytest treat `release/` (which has
# no __init__.py) as a package.
pythonpath = .
consider_namespace_packages = true
testpaths = tests
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
